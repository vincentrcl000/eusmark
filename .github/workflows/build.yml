name: Build Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    defaults:
      run:
        working-directory: ./eus-annotator
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x64
            artifact: 'EUS标注工具_${{ github.ref_name }}_x64-setup.exe'
          - platform: macos-latest
            target: universal
            artifact: 'EUS标注工具_${{ github.ref_name }}_universal.dmg'
          - platform: ubuntu-22.04
            target: x64
            artifact: 'eus-annotator_${{ github.ref_name }}_amd64.deb'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cargo install tauri-cli --version "^2"
          npm install
          npm run build

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          cargo install tauri-cli --version "^2"
          npm install
          npm run build

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cargo install tauri-cli --version "^2"
          npm install
          npm run build

      - name: Build Tauri app
        run: |
          npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: '**/*setup*.exe' '**/*.dmg' '**/*.deb'
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}