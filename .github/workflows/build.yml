name: Build Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    defaults:
      run:
        working-directory: ./eus-annotator
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            artifact: 'EUS标注工具_${{ github.ref_name }}_x64-setup.exe'
          - platform: macos-latest
            rust_target: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_target: universal
            artifact: 'EUS标注工具_${{ github.ref_name }}_universal.dmg'
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_target: x86_64-unknown-linux-gnu
            artifact: 'eus-annotator_${{ github.ref_name }}_amd64.deb'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          npm install

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          npm install

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          npm install

      - name: Build Tauri app
        run: |
          npx tauri build --target ${{ matrix.tauri_target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            eus-annotator/src-tauri/target/${{ matrix.tauri_target }}/release/bundle/**/*.exe
            eus-annotator/src-tauri/target/${{ matrix.tauri_target }}/release/bundle/**/*.dmg
            eus-annotator/src-tauri/target/${{ matrix.tauri_target }}/release/bundle/**/*.deb
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*setup*.exe
            **/*.dmg
            **/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}